name: Release

on:
  pull_request:
    branches: [main]
    # Skip building an installable when the PR only touches docs. The run is
    # skipped only if EVERY changed file matches one of these patterns.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CONTEXT.md'
      - 'ROADMAP.md'
      - 'AGENTS.md'

# Supersede only an OLDER build of the SAME PR — a new push to PR #X cancels
# PR #X's in-flight run (we keep just the latest build per PR anyway). Different
# PRs have different groups, so they build in parallel and never cancel each
# other. The shared publish step is serialized separately, on the deploy job.
concurrency:
  group: release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed .ipa
    runs-on: macos-15
    # Exposed so the deploy job can no-op when signing isn't configured yet.
    outputs:
      configured: ${{ steps.preflight.outputs.configured }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Without the signing secrets there is nothing to build that you could
      # install, so leave the rest of the job inert and keep the PR check green.
      # Set the five required secrets (see ci/README.md) to turn it on.
      - name: Check signing secrets
        id: preflight
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_EXTENSION: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXTENSION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] \
             && [ -n "$APPLE_PROVISIONING_PROFILE" ] && [ -n "$APPLE_PROVISIONING_PROFILE_EXTENSION" ] \
             && [ -n "$APPLE_TEAM_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release skipped::Signing secrets not set — skipping the installable build. See ci/README.md to enable it. (Since the Share Extension landed, APPLE_PROVISIONING_PROFILE_EXTENSION is required too.)"
          fi

      - name: Select latest stable Xcode
        if: steps.preflight.outputs.configured == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Import the distribution certificate into a throwaway keychain that lives
      # only for this run. This is what replaces the persistent login keychain of
      # the self-hosted Mac — the GitHub-hosted runner starts clean every time.
      - name: Import signing certificate
        if: steps.preflight.outputs.configured == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Make the temp keychain searchable so xcodebuild/codesign find the identity.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' 'NR==1 { print $2 }')"
          if [ -z "$IDENTITY" ]; then
            echo "No code-signing identity found in APPLE_CERTIFICATE_P12." >&2
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported identity: $IDENTITY"

      # Drop the two ad-hoc profiles (app + Share Extension — each bundle ID
      # needs its own) where Xcode looks for them, and read each name/UUID out
      # of the profile itself. The names must match the specifiers pinned in
      # the project's Release configs ("Quickie Ad Hoc" for the app, "Quickie
      # Share Extension Ad Hoc" for the extension) — verified here so a renamed
      # profile fails with a clear message instead of an opaque archive error.
      - name: Install provisioning profiles
        if: steps.preflight.outputs.configured == 'true'
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_EXTENSION: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXTENSION }}
        run: |
          set -euo pipefail
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          install_profile() { # $1 = base64 payload, $2 = expected name, $3 = env var for the name
            local path="$RUNNER_TEMP/$3.mobileprovision"
            echo -n "$1" | base64 --decode -o "$path"
            security cms -D -i "$path" > "$RUNNER_TEMP/$3.plist"
            local name uuid
            name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/$3.plist")"
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/$3.plist")"
            if [ "$name" != "$2" ]; then
              echo "::error title=Profile name mismatch::Expected a profile named '$2' but got '$name'. The Release build settings pin that exact name — rename the profile (or update project.pbxproj) so they match." >&2
              exit 1
            fi
            cp "$path" "$PP_DIR/$uuid.mobileprovision"
            echo "$3=$name" >> "$GITHUB_ENV"
            echo "Installed profile: $name ($uuid)"
          }

          install_profile "$APPLE_PROVISIONING_PROFILE" "Quickie Ad Hoc" PROFILE_NAME
          install_profile "$APPLE_PROVISIONING_PROFILE_EXTENSION" "Quickie Share Extension Ad Hoc" PROFILE_NAME_EXTENSION

      # Manual signing, pinned to the imported identity. The per-target ad-hoc
      # profiles come from the Release build settings in project.pbxproj
      # (PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]) rather than a command-
      # line override: an override applies to every target, and the
      # QuickieStoreKit framework must not get a profile at all while the app
      # and the extension each need their own. The app depends on QuickieCore
      # as a local SwiftPM package, which xcodebuild resolves on its own —
      # there are no CocoaPods here.
      - name: Archive
        if: steps.preflight.outputs.configured == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project App/Quickie.xcodeproj \
            -scheme Quickie \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Quickie.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export .ipa
        if: steps.preflight.outputs.configured == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo '<key>method</key><string>ad-hoc</string>'
            echo "<key>teamID</key><string>${APPLE_TEAM_ID}</string>"
            echo '<key>signingStyle</key><string>manual</string>'
            echo '<key>compileBitcode</key><false/>'
            echo '<key>provisioningProfiles</key><dict>'
            echo "<key>com.julesseguin.quickie</key><string>${PROFILE_NAME}</string>"
            echo "<key>com.julesseguin.quickie.ShareExtension</key><string>${PROFILE_NAME_EXTENSION}</string>"
            echo '</dict></dict></plist>'
          } > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Quickie.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

          mv "$RUNNER_TEMP/ipa/"*.ipa "$RUNNER_TEMP/ipa/quickie.ipa"

      # Hand the signed .ipa to the deploy job, which publishes it. The build
      # itself touches nothing shared, so it stays per-PR parallel.
      - name: Upload .ipa artifact
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ runner.temp }}/ipa/quickie.ipa
          if-no-files-found: error
          retention-days: 1

      # The keychain lives in RUNNER_TEMP and the runner is ephemeral, but delete
      # it explicitly so a leaked log line can't outlive the run.
      - name: Clean up keychain
        if: ${{ always() && steps.preflight.outputs.configured == 'true' }}
        run: security delete-keychain "$KEYCHAIN_PATH" || true

  deploy:
    name: Publish & Deploy
    needs: build
    if: needs.build.outputs.configured == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # force-push the build-history branch
      pages: write
      id-token: write
      actions: write    # delete a stale github-pages artifact before re-upload
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize the shared publish across ALL PRs — the read-modify-write of the
    # build-history branch and the Pages deploy must not race. Queue, never
    # cancel (cancel-in-progress: false), so a different PR's publish waits its
    # turn instead of being killed.
    concurrency:
      group: build-history-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .ipa artifact
        uses: actions/download-artifact@v4
        with:
          name: ipa
          path: /tmp/ipa

      # Seed the working site from the existing build-history branch (the
      # published builds we're keeping). `git archive` extracts the tree without
      # any git metadata; on the very first run the branch is absent and we
      # start empty.
      - name: Seed site from build-history
        run: |
          SITE=/tmp/site
          rm -rf "$SITE"; mkdir -p "$SITE"
          if git fetch origin build-history; then
            git archive origin/build-history | tar -x -C "$SITE"
            echo "Seeded from existing build-history branch."
          else
            echo "No build-history branch yet — starting fresh."
          fi

      - name: Assemble build history
        env:
          SITE_DIR: /tmp/site
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          IPA_PATH: /tmp/ipa/quickie.ipa
          PAGES_BASE_URL: https://julesseg.github.io/Quickie
          REPO_URL: https://github.com/julesseg/Quickie
          RETENTION: '5'
        run: node ci/assemble-build-history.mjs

      # Re-running only the failed `deploy` job re-runs this upload, so the run
      # ends up with TWO artifacts named `github-pages` and actions/deploy-pages
      # aborts ("Multiple artifacts named github-pages were unexpectedly found").
      # Delete any `github-pages` artifact left by an earlier attempt of THIS run
      # before uploading, so the upload below is the only one — making the deploy
      # job safely re-runnable (e.g. after a transient "try again later" from the
      # Pages backend). Scoped to `github.run_id`, so a concurrent PR's run (a
      # different run id, already serialized by the concurrency group) is never
      # touched.
      - name: Remove any stale Pages artifact from a prior attempt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ids="$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id')"
          if [ -z "$ids" ]; then
            echo "No pre-existing github-pages artifact — nothing to clean up."
          else
            for id in $ids; do
              echo "Deleting stale github-pages artifact $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      # Persist the assembled site back to the build-history branch as a single
      # rolling commit (force-push), so old multi-MB .ipa blobs never accumulate
      # in git history. The branch is a derived store, not a record.
      - name: Push build-history branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/site
          git init -q
          git checkout -q -b build-history
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Publish PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" build-history

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify
    needs: [build, deploy]
    runs-on: ubuntu-latest
    # `!cancelled()` (instead of `always()`) still runs on a genuine build/deploy
    # failure — so we keep the failure alert — but skips entirely when the run was
    # cancelled, e.g. superseded by a newer push to the same PR (see the
    # concurrency block above). A supersession isn't a failure, so it shouldn't
    # page anyone.
    if: ${{ !cancelled() && needs.build.outputs.configured == 'true' }}
    steps:
      - name: Send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHORT_SHA: ${{ github.event.pull_request.head.sha }}
          INSTALL_URL: https://julesseg.github.io/Quickie/builds/pr-${{ github.event.pull_request.number }}/
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set — skipping notification."
            exit 0
          fi
          # A cancelled build/deploy (e.g. this PR got a newer push) is not a
          # failure — stay quiet rather than firing the failure alert below.
          if [ "${{ needs.build.result }}" = "cancelled" ] || [ "${{ needs.deploy.result }}" = "cancelled" ]; then
            echo "Build or deploy was cancelled — skipping notification."
            exit 0
          fi
          SHA7="${SHORT_SHA:0:7}"
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            curl -fsS \
              -H "Title: Quickie build ready" \
              -H "Tags: white_check_mark" \
              -H "Click: ${INSTALL_URL}" \
              -d "${PR_TITLE} — ${SHA7}" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            curl -fsS \
              -H "Title: Quickie build failed" \
              -H "Tags: x" \
              -H "Priority: high" \
              -H "Click: ${RUN_URL}" \
              -d "${PR_TITLE} — ${SHA7} · tap for logs" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi
