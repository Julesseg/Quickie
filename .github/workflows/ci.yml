name: CI

# Skip CI when a change only touches docs. The run is skipped only if EVERY
# changed file matches one of these patterns — a mixed PR still runs in full.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CONTEXT.md'
      - 'ROADMAP.md'
      - 'AGENTS.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CONTEXT.md'
      - 'ROADMAP.md'
      - 'AGENTS.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core · swift test (Linux)
    runs-on: ubuntu-24.04
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v4
      - name: Run QuickieCore tests
        working-directory: Core
        run: swift test

  # Partition the XCUITest classes into shards so the (slow) UI suite can run
  # across several macOS runners in parallel. One sim-per-runner sidesteps the
  # contention that made same-runner `-parallel-testing-enabled` *slower* and
  # crash SwiftUI under CPU starvation on the ~3-core/7 GB hosted boxes.
  #
  # The split is computed from source, not hand-maintained: every UI suite is a
  # `class <Name>UITests: XCTestCase` in its own file, so a newly added suite is
  # always assigned to a shard automatically — it can never silently run in none.
  ui-test-plan:
    name: Plan UI test shards
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: plan
        name: Partition test classes into shards
        run: |
          set -euo pipefail
          # Bump SHARD_COUNT to trade billed macOS minutes for wall-clock: each
          # shard is a separate runner doing its own build + its slice of the suite.
          SHARD_COUNT=3
          # Balance shards by *test-method* count, not class count: a class holds
          # anywhere from 1 to 6 `func test`s, so round-robining classes lands
          # ~2/3 of the work on one runner and the wall clock barely moves. Instead
          # weigh each class by its test count and greedily pack the heaviest into
          # the currently-lightest shard (longest-processing-time bin packing).
          # Reading from source means a newly added suite is always assigned.
          python3 - "$SHARD_COUNT" <<'PY' >> "$GITHUB_OUTPUT"
          import glob, json, re, sys
          n = int(sys.argv[1])
          weights = []
          for path in sorted(glob.glob("App/QuickieUITests/*.swift")):
              src = open(path).read()
              m = re.search(r'class\s+([A-Za-z0-9_]+UITests)\b', src)
              if not m:
                  continue
              # `or 1` so a class with no test methods still occupies a slot.
              weights.append((len(re.findall(r'func\s+test', src)) or 1, m.group(1)))
          if not weights:
              sys.stderr.write("No XCUITest classes found under App/QuickieUITests.\n")
              sys.exit(1)
          weights.sort(reverse=True)
          buckets = [{"tests": 0, "classes": []} for _ in range(n)]
          for count, cls in weights:
              b = min(buckets, key=lambda x: x["tests"])
              b["tests"] += count
              b["classes"].append(cls)
          include = []
          for idx, b in enumerate(buckets, start=1):
              if not b["classes"]:
                  continue
              only = " ".join(f"-only-testing:QuickieUITests/{c}" for c in b["classes"])
              include.append({"shard": str(idx), "of": str(n), "only": only, "tests": str(b["tests"])})
          for e in include:
              sys.stderr.write(f"shard {e['shard']}/{e['of']}: {e['tests']} tests — {e['only']}\n")
          print("matrix=" + json.dumps({"include": include}))
          PY

  app-ui-tests:
    name: App · XCUITest (macOS) [shard ${{ matrix.shard }}/${{ matrix.of }}]
    needs: ui-test-plan
    runs-on: macos-15
    strategy:
      # Don't cancel the other shards when one fails — a red shard shouldn't hide
      # whether the rest are green, and it keeps each shard's crash log available.
      fail-fast: false
      matrix: ${{ fromJSON(needs.ui-test-plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: xcodebuild -version

      - name: Resolve an available iPhone simulator
        id: sim
        run: |
          set -euo pipefail
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; names=[x['name'] for rt in d for x in d[rt] if x['name'].startswith('iPhone')]; print(sorted(names)[-1] if names else 'iPhone 16')")
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build & run UI tests
        working-directory: App
        run: |
          set -o pipefail
          # `-retry-tests-on-failure -test-iterations 3` reruns only the tests that
          # fail, up to three attempts each, and the run passes if a retry passes.
          # This absorbs the simulator's transient launch/lifecycle flakes (e.g.
          # "Failed to get background assertion for target app", which strikes at
          # `app.launch()` on a fresh sim) without masking real regressions — a
          # genuinely broken test fails all three attempts and still reports failure.
          #
          # This shard runs only its assigned classes (`-only-testing:` from the
          # plan job) on a single simulator — no `-parallel-testing-enabled`, since
          # the parallelism here is across runners, not within one starved box.
          xcodebuild test \
            -project Quickie.xcodeproj \
            -scheme Quickie \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -resultBundlePath "TestResults-shard-${{ matrix.shard }}.xcresult" \
            -retry-tests-on-failure \
            -test-iterations 3 \
            ${{ matrix.only }} \
            CODE_SIGNING_ALLOWED=NO

      - name: Dump app crash reports on failure
        if: failure()
        run: |
          # Surface the actual crash/hang cause in the job log: when XCUITest
          # reports "Lost connection to the application", the reason lives in a
          # simulator .ips crash report on the host — buried inside the xcresult
          # artifact otherwise. Print this run's Quickie reports (the exception
          # message and termination reason sit in the header) so the failure is
          # diagnosable straight from the log.
          set +e
          find ~/Library/Logs/DiagnosticReports -name '*.ips' -mmin -90 2>/dev/null | while read -r f; do
            case "$(basename "$f")" in
              Quickie*|quickie*) ;;
              *) continue ;;
            esac
            echo "================ $f"
            head -c 20000 "$f"
            echo
          done
          true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-shard-${{ matrix.shard }}
          path: App/TestResults-shard-${{ matrix.shard }}.xcresult
          if-no-files-found: ignore
