name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core · swift test (Linux)
    runs-on: ubuntu-24.04
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v4
      - name: Run QuickieCore tests
        working-directory: Core
        run: swift test

  app-ui-tests:
    name: App · XCUITest (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: xcodebuild -version

      - name: Resolve an available iPhone simulator
        id: sim
        run: |
          set -euo pipefail
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; names=[x['name'] for rt in d for x in d[rt] if x['name'].startswith('iPhone')]; print(sorted(names)[-1] if names else 'iPhone 16')")
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build & run UI tests
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild test \
            -project Quickie.xcodeproj \
            -scheme Quickie \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: App/TestResults.xcresult
          if-no-files-found: ignore
